# Bundle app/js (ES modules) into app/dist/bundle.js before publishing.
# Everything else in the repo (data/, tools/label/, index.html itself,
# site.webmanifest, og-image.png, app/assets/, app/css/) is untouched by
# this build step and continues to be served exactly as it is in the repo.
[build]
  command = "npm run build"
  publish = "."

# Serve /label as a clean URL pointing to the label tool
[[redirects]]
  from = "/label"
  to   = "/tools/label/index.html"
  status = 200

[[redirects]]
  from = "/label/"
  to   = "/tools/label/index.html"
  status = 200
