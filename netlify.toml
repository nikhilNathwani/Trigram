# Astro build. public/js, public/assets, public/og-image.png, and
# public/site.webmanifest are untouched by `astro build`, copied into
# dist/ verbatim on its own (the standard Astro public/ mechanism). Just
# the two runtime-fetched data files and tools/label/ (not those
# directories wholesale — see the comment in package.json's "build" script
# and astro.config.mjs) are copied in an extra `cp` step afterward.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Astro 7 requires Node >=22.12.0; Netlify's build image defaults to an
  # older Node otherwise (was 18.20.8 as of the last recorded deploy log,
  # which was already under Vite 7's stated minimum too).
  NODE_VERSION = "22"

# Serve /label as a clean URL pointing to the label tool
[[redirects]]
  from = "/label"
  to   = "/tools/label/index.html"
  status = 200

[[redirects]]
  from = "/label/"
  to   = "/tools/label/index.html"
  status = 200
