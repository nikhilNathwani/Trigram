# No build step: index.html loads app/js/game.js as a native ES module and
# the browser resolves its whole import graph itself. The repo is published
# as-is.
[build]
  publish = "."

# Serve /label as a clean URL pointing to the label tool
[[redirects]]
  from = "/label"
  to   = "/tools/label/index.html"
  status = 200

[[redirects]]
  from = "/label/"
  to   = "/tools/label/index.html"
  status = 200
