<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
		<meta name="robots" content="noindex, nofollow" />
		<title>Trigram Label</title>
		<link rel="stylesheet" href="/tools/label/style.css" />
	</head>
	<body>
		<div id="app">
			<header id="hdr">
				<span id="trigram-display">—</span>
				<span id="progress-display"></span>
			</header>

			<div id="word-area"></div>

			<div id="scroll-controls">
				<button id="btn-rewind">⏮ Back</button>
				<button id="btn-forward">⏩ Forward</button>
				<button id="btn-jump">⏭ Jump</button>
			</div>

			<div id="bottom">
				<div id="action-btns">
					<button id="btn-yes" class="act yes">YES</button>
					<button id="btn-no" class="act no">NO</button>
					<button id="btn-maybe" class="act maybe">MAYBE</button>
				</div>
				<div id="prompt" hidden>
					<p id="prompt-msg"></p>
					<textarea id="prompt-input" placeholder="Required comment…" hidden></textarea>
					<div class="prompt-row">
						<button id="prompt-confirm">Confirm</button>
						<button id="prompt-cancel">Cancel</button>
					</div>
				</div>
			</div>
		</div>

		<script type="module" src="/tools/label/app.js"></script>
	</body>
</html>
